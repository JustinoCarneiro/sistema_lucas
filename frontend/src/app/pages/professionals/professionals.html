<div class="p-8">
  <div class="mb-8 flex justify-between items-end">
    <div>
      <h2 class="text-3xl font-bold text-gray-800">Corpo Clínico 🩺</h2>
      <p class="text-gray-500 font-medium">Gerencie os profissionais de saúde cadastrados no sistema.</p>
    </div>
    <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-6 rounded-xl transition shadow-lg shadow-blue-200">
      + Cadastrar Médico
    </button>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50/80">
        <tr>
          <th scope="col" class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Nome do Profissional</th>
          <th scope="col" class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Especialidade</th>
          <th scope="col" class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">CRM</th>
          <th scope="col" class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">E-mail</th>
          <th scope="col" class="px-6 py-4 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">Ações</th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-100">
        <tr *ngFor="let prof of professionals" class="hover:bg-blue-50/50 transition-colors duration-150">
          <td class="px-6 py-4 whitespace-nowrap">
            <div class="flex items-center">
              <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-xs mr-3">
                {{ prof.name.charAt(0) }}
              </div>
              <span class="text-sm text-gray-800 font-semibold">{{ prof.name }}</span>
            </div>
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600 font-medium">
            {{ prof.specialty }}
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
            {{ prof.crm }}
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 italic">
            {{ prof.email }}
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
            <button class="text-blue-600 hover:text-blue-900 mr-4">Editar</button>
            <button class="text-red-600 hover:text-red-900">Excluir</button>
          </td>
        </tr>
      </tbody>
    </table>

    <div *ngIf="professionals.length === 0" class="p-10 text-center text-gray-500">
      Nenhum médico encontrado na base de dados.
    </div>
  </div>
</div>
