<!-- frontend/src/app/pages/register/register.html -->
<div class="min-h-screen bg-gray-50 flex flex-col justify-center items-center p-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">

    <div class="p-8 text-center bg-blue-900">
      <h1 class="text-3xl font-bold text-white mb-2">Sistema Lucas</h1>
      <p class="text-blue-200">Portal do Paciente</p>
    </div>

    <div class="p-8">
      <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Crie sua Conta</h2>

      <!-- Mensagem de erro -->
      <div *ngIf="errorMessage()"
        class="mb-4 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 text-sm rounded-r-lg flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd"
            d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
            clip-rule="evenodd" />
        </svg>
        {{ errorMessage() }}
      </div>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-4">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nome Completo</label>
          <input type="text" formControlName="name"
            placeholder="Lucas Silva"
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
          <input type="email" formControlName="email"
            placeholder="lucas@email.com"
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
          <p *ngIf="registerForm.get('email')?.errors?.['email'] && registerForm.get('email')?.touched"
            class="text-red-500 text-xs mt-1">
            Informe um e-mail válido.
          </p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
          <input type="password" formControlName="password"
            placeholder="••••••••"
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
          <p *ngIf="registerForm.get('password')?.errors?.['minlength'] && registerForm.get('password')?.touched"
            class="text-red-500 text-xs mt-1">
            A senha deve ter pelo menos 6 caracteres.
          </p>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">CPF</label>
            <input type="text" formControlName="cpf"
              placeholder="000.000.000-00"
              class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">WhatsApp</label>
            <input type="text" formControlName="whatsapp"
              placeholder="11999990000"
              class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
          </div>
        </div>

        <button type="submit" [disabled]="registerForm.invalid || isLoading()"
          class="w-full bg-blue-900 hover:bg-blue-800 text-white font-bold py-3 rounded-xl transition shadow-md disabled:opacity-50 disabled:cursor-not-allowed mt-2">
          {{ isLoading() ? 'Criando conta...' : 'Cadastrar e Acessar' }}
        </button>

      </form>

      <div class="mt-6 text-center border-t border-gray-100 pt-4">
        <p class="text-sm text-gray-600">
          Já tem uma conta?
          <a routerLink="/login" class="text-blue-600 font-bold hover:text-blue-800 transition">
            Faça Login
          </a>
        </p>
      </div>

    </div>
  </div>
</div>
