<!-- frontend/src/app/pages/register/register.html -->
<div class="min-h-screen bg-gray-50 dark:bg-gray-900 flex flex-col justify-center items-center p-4 transition-colors duration-300">
  <div class="max-w-md w-full bg-white dark:bg-gray-800 rounded-xl shadow-lg overflow-hidden">

    <div class="p-8 text-center bg-blue-900 flex flex-col items-center">
      <div class="w-20 h-20 mb-4 overflow-hidden rounded-xl shadow-lg border-2 border-white/20">
        <img src="logo.jpeg" alt="Logo" class="w-full h-full object-cover">
      </div>
      <h1 class="text-3xl font-bold text-white mb-1">Projeto Lucas</h1>
      <p class="text-blue-200 text-sm italic">Lugar de cuidado, amor e salvação</p>
    </div>

    <div class="p-8">
      <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-6 text-center">Crie sua Conta</h2>

      <!-- Mensagem de erro -->
      <div *ngIf="errorMessage()"
        class="mb-4 p-4 bg-red-50 dark:bg-red-900/30 border-l-4 border-red-500 text-red-700 dark:text-red-300 text-sm rounded-r-lg flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd"
            d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
            clip-rule="evenodd" />
        </svg>
        {{ errorMessage() }}
      </div>

      <!-- Mensagem de sucesso -->
      <div *ngIf="successMessage()"
        id="success-message"
        class="mb-4 p-4 bg-green-50 dark:bg-green-900/30 border-l-4 border-green-500 text-green-700 dark:text-green-300 text-sm rounded-r-lg flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
        </svg>
        {{ successMessage() }}
      </div>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-4">

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Nome Completo</label>
          <input type="text" formControlName="name"
            placeholder="Lucas Silva"
            class="w-full px-4 py-2 border border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">E-mail</label>
          <input type="email" formControlName="email"
            placeholder="lucas@email.com"
            class="w-full px-4 py-2 border border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
          <p *ngIf="registerForm.get('email')?.errors?.['email'] && registerForm.get('email')?.touched"
            class="text-red-500 dark:text-red-400 text-xs mt-1">
            Informe um e-mail válido.
          </p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Senha</label>
          <input type="password" formControlName="password"
            placeholder="••••••••"
            class="w-full px-4 py-2 border border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
          <p *ngIf="registerForm.get('password')?.errors?.['minlength'] && registerForm.get('password')?.touched"
            class="text-red-500 dark:text-red-400 text-xs mt-1">
            A senha deve ter pelo menos 6 caracteres.
          </p>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">CPF</label>
            <input type="text" formControlName="cpf" (input)="applyCpfMask($event)"
              placeholder="000.000.000-00"
              class="w-full px-4 py-2 border border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">WhatsApp</label>
            <input type="text" formControlName="whatsapp" (input)="applyPhoneMask($event)"
              placeholder="(11) 99999-0000"
              class="w-full px-4 py-2 border border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
          </div>
        </div>

        <!-- LGPD — consentimento expresso obrigatório -->
        <div class="flex items-start gap-2 mt-2">
          <input type="checkbox" id="termsAccepted" formControlName="termsAccepted"
            class="mt-0.5 w-4 h-4 accent-blue-600 shrink-0">
          <label for="termsAccepted" class="text-sm text-gray-600 dark:text-gray-400 leading-snug">
            Declaro que li e aceito os
            <a routerLink="/privacidade" target="_blank"
              class="text-blue-700 dark:text-blue-400 font-semibold hover:underline">Termos de Uso e a Política de Privacidade</a>
            para o tratamento dos meus dados (LGPD)
          </label>
        </div>

        <button type="submit" [disabled]="registerForm.invalid || isLoading()"
          class="w-full bg-blue-900 dark:bg-blue-700 hover:bg-blue-800 dark:hover:bg-blue-600 text-white font-bold py-3 rounded-xl transition shadow-md disabled:opacity-50 disabled:cursor-not-allowed mt-2">
          {{ isLoading() ? 'Criando conta...' : 'Cadastrar e Acessar' }}
        </button>

      </form>

      <div class="mt-6 text-center border-t border-gray-100 dark:border-gray-700 pt-4">
        <p class="text-sm text-gray-600 dark:text-gray-400">
          Já tem uma conta?
          <a routerLink="/login" class="text-blue-600 dark:text-blue-400 font-bold hover:text-blue-800 dark:hover:text-blue-300 transition">
            Faça Login
          </a>
        </p>
      </div>

    </div>
  </div>
</div>
