<div class="min-h-screen bg-gray-50 flex flex-col justify-center items-center p-4 text-center">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
    <div *ngIf="isSuccess()" class="text-green-600 mb-4">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <h2 class="text-2xl font-bold">Sucesso!</h2>
    </div>

    <div *ngIf="isError()" class="text-red-600 mb-4">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <h2 class="text-2xl font-bold">Ops!</h2>
    </div>

    <p class="text-gray-600 mb-6">{{ message() }}</p>

    <a routerLink="/login" class="inline-block bg-blue-900 hover:bg-blue-800 text-white font-bold py-2 px-6 rounded-lg transition shadow-md">
      Ir para Login
    </a>
  </div>
</div>
