<!-- frontend/src/app/pages/patients/patients.html -->
<div class="p-8">
  <div class="mb-8">
    <h2 class="text-3xl font-bold text-gray-800">Pacientes</h2>
    <p class="text-gray-500 font-medium">Visualize os pacientes cadastrados na clínica.</p>
  </div>

  <div *ngIf="patientsList().length === 0"
    class="bg-gray-50 border-2 border-dashed border-gray-200 p-10 rounded-2xl text-center text-gray-400">
    Nenhum paciente cadastrado ainda.
  </div>

  <div *ngIf="patientsList().length > 0"
    class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase">Nome</th>
          <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase">E-mail</th>
          <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase">CPF</th>
          <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase">WhatsApp</th>
          <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase">Convênio</th>
          <th class="px-6 py-4 text-right text-xs font-bold text-gray-500 uppercase">Ação</th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-100">
        <tr *ngFor="let patient of patientsList()" class="hover:bg-blue-50/50 transition-colors">
          <td class="px-6 py-4 whitespace-nowrap">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-full bg-green-100 text-green-700 flex items-center justify-center font-bold text-xs">
                {{ patient.name.charAt(0) }}
              </div>
              <span class="text-sm font-semibold text-gray-800">{{ patient.name }}</span>
            </div>
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 italic">{{ patient.email }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">{{ patient.cpf || '—' }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">{{ patient.phone || '—' }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">{{ patient.insurance || '—' }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-right">
            <button (click)="deletePaciente(patient.id, patient.name)"
              class="text-sm text-red-600 hover:text-red-900 font-medium transition">
              Remover
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
