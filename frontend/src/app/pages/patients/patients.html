<!-- frontend/src/app/pages/patients/patients.html -->
<div class="p-8">
  <div class="mb-8">
    <h2 class="text-3xl font-bold text-gray-800">Pacientes</h2>
    <p class="text-gray-500 font-medium">Cadastre e gerencie os pacientes da clínica.</p>
  </div>

  <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 mb-8">
    <h3 class="text-lg font-bold text-gray-700 mb-4">Novo Paciente</h3>
    <form [formGroup]="patientForm" (ngSubmit)="onSubmit()" class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <input type="text" formControlName="name" placeholder="Nome Completo"
        class="px-4 py-2 border border-gray-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
      <input type="email" formControlName="email" placeholder="E-mail"
        class="px-4 py-2 border border-gray-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
      <input type="text" formControlName="cpf" placeholder="CPF"
        class="px-4 py-2 border border-gray-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
      <input type="text" formControlName="healthInsurance" placeholder="Plano de Saúde (Opcional)"
        class="px-4 py-2 border border-gray-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
      <input type="password" formControlName="password" placeholder="Senha de Acesso"
        class="px-4 py-2 border border-gray-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
      <button type="submit" [disabled]="patientForm.invalid"
        class="bg-blue-900 text-white font-bold py-2 rounded-xl hover:bg-blue-800 transition disabled:opacity-50">
        Cadastrar Paciente
      </button>
    </form>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase">Nome</th>
          <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase">E-mail</th>
          <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase">CPF</th>
          <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase">Plano</th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-100">
        <tr *ngFor="let patient of patientsList()" class="hover:bg-blue-50/50 transition-colors">
          <td class="px-6 py-4 whitespace-nowrap">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-full bg-green-100 text-green-700 flex items-center justify-center font-bold text-xs">
                {{ patient.name.charAt(0) }}
              </div>
              <span class="text-sm font-semibold text-gray-800">{{ patient.name }}</span>
            </div>
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 italic">{{ patient.email }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">{{ patient.cpf || '—' }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">{{ patient.insurance || '—' }}</td>
        </tr>
      </tbody>
    </table>
    <div *ngIf="patientsList().length === 0" class="p-10 text-center text-gray-400">
      Nenhum paciente cadastrado.
    </div>
  </div>
</div>
