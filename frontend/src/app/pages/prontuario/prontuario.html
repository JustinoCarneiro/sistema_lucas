<!-- frontend/src/app/pages/prontuario/prontuario.html -->
<div class="p-6 max-w-3xl mx-auto">

  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Prontuário</h1>
    <p class="text-gray-500 mt-1">
      Paciente: <span class="font-medium text-gray-700">{{ nomePaciente() }}</span>
    </p>
  </div>

  <div *ngIf="isLoading()" class="text-center text-gray-400 py-10">Carregando dados da consulta...</div>

  <div *ngIf="!isLoading()">

    <div class="bg-white border border-gray-200 rounded-xl p-5 mb-6 shadow-sm">
      <h2 class="text-lg font-semibold text-gray-700 mb-3">Anotações do atendimento</h2>
      <textarea [(ngModel)]="novasNotas" rows="6"
        placeholder="Descreva as observações, queixas, evolução e encaminhamentos..."
        class="w-full border border-gray-300 rounded-lg p-3 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none">
      </textarea>
      <div class="mt-3 flex justify-end">
        <button (click)="salvarProntuario()"
          class="bg-blue-900 text-white px-5 py-2 rounded-lg text-sm font-medium hover:bg-blue-800 transition">
          Salvar e finalizar atendimento
        </button>
      </div>
    </div>

    <div class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm">
      <h2 class="text-lg font-semibold text-gray-700 mb-4">Histórico de atendimentos</h2>

      <div *ngIf="historico().length === 0" class="text-sm text-gray-400 text-center py-4">
        Nenhum atendimento anterior registrado.
      </div>

      <div *ngFor="let item of historico()" class="border-b border-gray-100 pb-4 mb-4 last:border-0 last:mb-0 last:pb-0">
        <div class="flex justify-between items-center mb-1">
          <span class="text-xs font-medium text-blue-700 bg-blue-50 px-2 py-1 rounded">
            {{ item.criadoEm | date:'dd/MM/yyyy HH:mm' }}
          </span>
          <span class="text-xs text-gray-400">{{ item.professional?.name || 'Profissional' }}</span>
        </div>
        <p class="text-sm text-gray-600 leading-relaxed whitespace-pre-line">{{ item.notas }}</p>
      </div>
    </div>

  </div>
</div>
