<!-- frontend/src/app/pages/professional-appointments/professional-appointments.html -->
<div class="p-6 max-w-4xl mx-auto">

  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Agenda do Dia</h1>
    <p class="text-gray-500 mt-1">{{ today | date:'EEEE, dd/MM/yyyy' }}</p>
  </div>

  <div *ngIf="isLoading" class="text-center text-gray-400 py-20 animate-pulse">
    Carregando agenda...
  </div>

  <div *ngIf="!isLoading && appointments.length === 0"
    class="bg-gray-50 border-2 border-dashed border-gray-200 p-16 rounded-2xl text-center">
    <div class="text-5xl mb-4">📅</div>
    <p class="text-gray-500 text-lg font-medium">Nenhuma consulta agendada para hoje.</p>
  </div>

  <div *ngIf="!isLoading && appointments.length > 0" class="space-y-4">
    <div *ngFor="let app of appointments"
      class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-4 hover:shadow-md transition">

      <!-- Hora + dados do paciente -->
      <div class="flex items-center gap-4 flex-1">
        <div class="bg-blue-900 text-white px-4 py-3 rounded-xl font-bold text-lg flex-shrink-0">
          {{ app.startTime | date:'HH:mm' }}
        </div>
        <div>
          <h3 class="font-bold text-gray-800 text-base">{{ app.patientName }}</h3>
          <p class="text-sm text-gray-500">{{ app.reason || 'Consulta de rotina' }}</p>
          <span class="text-xs font-medium px-2 py-1 rounded-full mt-1 inline-block"
            [ngClass]="statusClass[app.status]">
            {{ statusLabel[app.status] }}
          </span>
        </div>
      </div>

      <!-- Ações -->
      <div class="flex gap-2 flex-shrink-0 flex-wrap">

        <!-- Confirmar — só aparece quando o paciente já confirmou -->
        <button *ngIf="app.status === 'CONFIRMADA_PACIENTE'"
          (click)="confirmarConsulta(app)"
          class="bg-green-50 hover:bg-green-100 text-green-700 border border-green-200 px-4 py-2 rounded-lg font-medium text-sm transition">
          Confirmar
        </button>

        <!-- Iniciar atendimento — disponível para AGENDADA e CONFIRMADA -->
        <button
          *ngIf="app.status === 'AGENDADA' || app.status === 'CONFIRMADA_PACIENTE' || app.status === 'CONFIRMADA'"
          (click)="iniciarAtendimento(app)"
          class="bg-blue-900 hover:bg-blue-800 text-white px-4 py-2 rounded-lg font-medium text-sm transition shadow-sm">
          Iniciar atendimento
        </button>

        <!-- Marcar falta -->
        <button
          *ngIf="app.status === 'AGENDADA' || app.status === 'CONFIRMADA_PACIENTE' || app.status === 'CONFIRMADA'"
          (click)="marcarFalta(app)"
          class="bg-gray-100 hover:bg-red-50 hover:text-red-600 text-gray-600 border border-gray-200 px-4 py-2 rounded-lg font-medium text-sm transition">
          Paciente faltou
        </button>

      </div>
    </div>
  </div>

</div>
