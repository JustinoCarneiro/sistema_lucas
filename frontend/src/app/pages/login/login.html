<!-- frontend/src/app/pages/login/login.html -->
<div class="min-h-screen bg-gradient-to-br from-blue-50 to-gray-100 flex items-center justify-center p-4">
  <div class="bg-white p-6 sm:p-10 rounded-2xl shadow-2xl w-full max-w-md border border-white/50">

    <!-- Logo -->
    <div class="text-center mb-10">
      <div class="mx-auto w-16 h-16 bg-blue-100 text-blue-800 rounded-full flex items-center justify-center mb-4 shadow-inner">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-3-3v6" />
        </svg>
      </div>
      <h2 class="text-4xl font-extrabold text-gray-800 tracking-tight">
        Sistema <span class="text-blue-800">Lucas</span>
      </h2>
      <p class="text-gray-500 mt-2 font-medium">Acesso seguro ao seu portal de saúde</p>
    </div>

    <!-- Mensagem de erro — usa signal com () -->
    <div *ngIf="errorMessage()"
      class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 text-sm rounded-r-lg flex items-center shadow-sm">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd"
          d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
          clip-rule="evenodd" />
      </svg>
      {{ errorMessage() }}
    </div>

    <!-- Formulário -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">

      <div>
        <label for="email" class="block text-sm font-semibold text-gray-700 mb-1">E-mail</label>
        <input type="email" id="email" formControlName="email"
          placeholder="seu@email.com"
          class="block w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all duration-200">
        <span *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
          class="text-xs text-red-500 mt-1 ml-1 font-medium">
          E-mail inválido.
        </span>
      </div>

      <div>
        <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">Senha</label>
        <input type="password" id="password" formControlName="password"
          placeholder="••••••••"
          class="block w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all duration-200">
      </div>

      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center text-gray-600 cursor-pointer gap-2">
          <input type="checkbox"
            class="rounded border-gray-300 text-blue-800 shadow-sm focus:ring-blue-200">
          Lembrar-me
        </label>
        <a routerLink="/esqueci-senha"
          class="text-blue-800 hover:text-blue-900 font-medium hover:underline">
          Esqueceu a senha?
        </a>
      </div>

      <button type="submit" [disabled]="loginForm.invalid || isLoading()"
        class="w-full flex justify-center py-3.5 px-4 rounded-xl shadow-lg shadow-blue-800/30 text-sm font-bold text-white bg-blue-800 hover:bg-blue-900 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-800 transition-all transform hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:transform-none disabled:shadow-none">
        {{ isLoading() ? 'Entrando...' : 'Entrar no sistema' }}
      </button>

    </form>

    <!-- Rodapé -->
    <div class="mt-8 text-center border-t border-gray-100 pt-6">
      <p class="text-sm text-gray-600">Ainda não é paciente?</p>
      <a routerLink="/register"
        class="mt-2 inline-block text-blue-800 font-bold hover:text-blue-900 transition">
        Crie a sua conta aqui &rarr;
      </a>
    </div>

  </div>
</div>
