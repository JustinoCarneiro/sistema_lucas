services:
  db:
    image: postgres:15-alpine
    container_name: lucas-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lucas-network
    volumes:
      - lucas-db-data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: lucas-api
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Repassando as variáveis do .env para o container Java
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_PORT: ${DB_PORT}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      MAIL_USERNAME: ${MAIL_USERNAME} # ✅ novo
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD}
      INITIAL_ADMIN_NAME: ${INITIAL_ADMIN_NAME}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    ports:
      - "8081:8081"
    networks:
      - lucas-network
    dns:
      - 8.8.8.8
      - 1.1.1.1

  frontend:
    build: ./frontend
    container_name: lucas-web
    restart: always
    environment:
      - API_URL=${API_URL} # Pega do .env (ex: https://lucas.institutomelvin.org/api)
    ports:
      - "8082:80"
    networks:
      - lucas-network

networks:
  lucas-network:
    driver: bridge

volumes:
  lucas-db-data:
