spring.application.name=sistema-lucas

server.port=8081

# Configuração do Banco de Dados usando Variáveis de Ambiente
spring.datasource.url=jdbc:postgresql://db:5432/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Flyway config
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=baseline
spring.flyway.validate-on-migrate=false

# JWT Secret
api.security.token.secret=${JWT_SECRET}

# Chave de criptografia para dados sensíveis (AES-128 exige 16 chars)
api.security.encryption.key=${ENCRYPTION_KEY:sistema-lucas-key}

# CORS - origens permitidas (separadas por vírgula)
app.cors.allowed-origins=${ALLOWED_ORIGINS}

# E-mail (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# --- INICIALIZAÇÃO DE ADMIN (PRODUÇÃO E DEV) ---
app.admin.email=${INITIAL_ADMIN_EMAIL:admin@clinica.com}
app.admin.password=${INITIAL_ADMIN_PASSWORD:admin}
app.admin.name=${INITIAL_ADMIN_NAME:Administrador Fundador}