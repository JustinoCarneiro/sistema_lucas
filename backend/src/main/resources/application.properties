spring.application.name=sistema-lucas

# AUD-04: Carregar segredos automaticamente (se existirem via Docker Secrets)
spring.config.import=optional:configtree:/run/secrets/

server.port=8081

# Configuração do Banco de Dados usando Variáveis de Ambiente
spring.datasource.url=jdbc:postgresql://db:5432/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS:${db_pass}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Flyway config
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=baseline
spring.flyway.validate-on-migrate=false

# JWT Secret
api.security.token.secret=${JWT_SECRET:${jwt_secret}}

# Chave de criptografia antiga para retrocompatibilidade (AES-128 exige 16 chars)
api.security.encryption.key.old=${ENCRYPTION_KEY_OLD:${encryption_key_old:sistema-lucas-key}}
# Nova chave de criptografia para dados sensíveis (AES-256 exige 32 chars)
api.security.encryption.key=${ENCRYPTION_KEY:${encryption_key:sistema-lucas-key-256-bits-segura}}

# LGPD AUD-03: Pepper para HMAC-SHA256 do hash de CPF (impede força bruta)
api.security.cpf-hash.pepper=${CPF_HASH_PEPPER:default-pepper-projeto-lucas}

# CORS - origens permitidas (separadas por vírgula)
app.cors.allowed-origins=${ALLOWED_ORIGINS}

# E-mail (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD:${mail_password}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# --- INICIALIZAÇÃO DE ADMIN (PRODUÇÃO E DEV) ---
app.admin.email=${INITIAL_ADMIN_EMAIL:admin@clinica.com}
app.admin.password=${INITIAL_ADMIN_PASSWORD:${initial_admin_password:admin123}}
app.admin.name=${INITIAL_ADMIN_NAME:Administrador}

# --- LGPD: versão vigente dos Termos de Uso / Política de Privacidade ---
# Incremente sempre que o conteúdo dos termos mudar — novos consentimentos
# passam a registrar a nova versão (rastreabilidade do consentimento).
app.lgpd.terms-version=${LGPD_TERMS_VERSION:1.0}