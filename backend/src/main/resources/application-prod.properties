# --- Perfil de Produção ---
# AUD-10: Em produção, SOMENTE o Flyway gerencia o schema do banco.
# O ddl-auto=update é desativado para evitar drift de schema não rastreável.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# SEC-01: em produção o tráfego é HTTPS — cookie de sessão com a flag Secure ativa.
app.security.cookie.secure=true
