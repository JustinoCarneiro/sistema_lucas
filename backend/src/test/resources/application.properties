# Configuração do Banco de Dados H2 para Testes
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Segurança (Valores dummy para testes)
api.security.token.secret=test-secret-key-12345678901234567890123456789012
api.security.encryption.key=test-encryption-key-123

# CORS
app.cors.allowed-origins=http://localhost:4200

# Desativar docker-compose support em testes para evitar tentar conectar no postgres real
spring.docker.compose.enabled=false

# Flyway (Desativar em testes se preferir ddl-auto ou configurar para H2)
spring.flyway.enabled=false

# Mail (Dummy config para os testes passarem sem tentar conectar no SMTP real)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Segurança (Consistente com application.properties real)
api.security.token.secret=test-secret-key-12345678901234567890123456789012
api.security.encryption.key=test-encryption-key-1234567890123456

# Variáveis de ambiente como fallback
JWT_SECRET=test-secret-key-12345678901234567890123456789012
ENCRYPTION_KEY=test-encryption-key-1234567890123456
ALLOWED_ORIGINS=http://localhost:4200
DB_NAME=testdb
DB_USER=sa
DB_PASS=
